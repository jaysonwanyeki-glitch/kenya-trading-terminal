name: Aider Financial Engine

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  aider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aider Agent
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Force Execute Aider Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force a clean HEAD checkout and run Aider with a streaming prompt override
          git checkout -B main
          aider --model gemini/gemini-2.5-flash --yes --stream --message "$ISSUE_BODY"

      - name: Push Updates
        run: |
          git push origin main --force || echo "No modifications detected"
